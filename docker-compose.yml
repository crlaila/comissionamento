services:
  postgres:
    image: postgres:16-alpine
    container_name: comissionamento-db
    environment:
      POSTGRES_DB: comissionamento
      POSTGRES_USER: comissionamento
      POSTGRES_PASSWORD: comissionamento
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comissionamento"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
